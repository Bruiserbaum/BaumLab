version: "3.9"

services:
  api:
    build: ./backend
    container_name: baumlab-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8100}:8000"
    volumes:
      - ./data:/app/data          # SQLite database + persistent state
      - ./config:/app/config      # User config (credentials, scan ranges, etc.)
    # Set these in Portainer → Stack → Environment Variables (or in a local .env file)
    # Required: SECRET_KEY, ADMIN_PASSWORD
    # Optional: ADMIN_USERNAME (default: admin), TOKEN_EXPIRE_HOURS (default: 8)
    #           API_PORT (default: 8100), UI_PORT (default: 3100)
    environment:
      - DATABASE_URL=sqlite:///./data/baumlab.db
      - CONFIG_PATH=/app/config/config.yaml
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - TOKEN_EXPIRE_HOURS=${TOKEN_EXPIRE_HOURS:-8}
    networks:
      - baumlab
    # HOST networking required for raw ICMP ping and ARP scanning
    # Swap to the line below if you want ping/ARP to see your LAN:
    # network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW

  frontend:
    build: ./frontend
    container_name: baumlab-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3100}:80"
    depends_on:
      - api
    networks:
      - baumlab

networks:
  baumlab:
    driver: bridge
