version: "3.9"

services:
  api:
    build: ./backend
    container_name: baumlab-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8100}:8000"
      - "${SYSLOG_PORT:-514}:514/udp"   # Syslog receiver (UDP)
    volumes:
      - ./data:/app/data          # SQLite database + persistent state
      - ./config:/app/config      # User config (credentials, scan ranges, etc.)
      - gvmd-socket:/var/run/gvmd # Shared gvmd Unix socket from OpenVAS
    # Set these in Portainer → Stack → Environment Variables (or in a local .env file)
    # Required: SECRET_KEY, ADMIN_PASSWORD
    # Optional: ADMIN_USERNAME (default: admin), TOKEN_EXPIRE_HOURS (default: 8)
    #           API_PORT (default: 8100), UI_PORT (default: 3100)
    #           SYSLOG_PORT (default: 514) — UDP port to receive syslog from NAS/devices
    environment:
      - DATABASE_URL=sqlite:///./data/baumlab.db
      - CONFIG_PATH=/app/config/config.yaml
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - TOKEN_EXPIRE_HOURS=${TOKEN_EXPIRE_HOURS:-8}
      # Authentik SSO — uncomment and fill in .env to enable
      # - OIDC_ENABLED=${OIDC_ENABLED:-false}
      # - OIDC_ISSUER=${OIDC_ISSUER}
      # - OIDC_CLIENT_ID=${OIDC_CLIENT_ID}
      # - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET}
      # - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI}
      # - OIDC_FRONTEND_URL=${OIDC_FRONTEND_URL}
    networks:
      - baumlab
    depends_on:
      - openvas
    # HOST networking required for raw ICMP ping and ARP scanning
    # Swap to the line below if you want ping/ARP to see your LAN:
    # network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW

  frontend:
    build: ./frontend
    container_name: baumlab-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3100}:80"
    depends_on:
      - api
    networks:
      - baumlab

  # ---------------------------------------------------------------------------
  # Greenbone Community Edition / OpenVAS
  # Powered by OpenVAS — https://www.openvas.org/
  # Greenbone Community Edition — https://github.com/greenbone/
  # ---------------------------------------------------------------------------
  # NOTE: First startup takes 15-60 minutes to sync the NVT/SCAP/CERT feed data.
  # The gvmd Unix socket is shared with the api container via the gvmd-socket volume.
  # Default admin credentials are set via OPENVAS_ADMIN_PASSWORD below.
  # ---------------------------------------------------------------------------
  openvas:
    image: immauss/openvas:latest
    container_name: baumlab-openvas
    restart: unless-stopped
    hostname: openvas
    volumes:
      - openvas-data:/data              # NVT feeds, SCAP/CERT data, scan results
      - gvmd-socket:/var/run/gvmd       # Unix socket shared with api container
    environment:
      - USERNAME=${OPENVAS_ADMIN_USERNAME:-admin}
      - PASSWORD=${OPENVAS_ADMIN_PASSWORD:-changeme}
    ports:
      - "${OPENVAS_PORT:-9392}:9392"    # Greenbone Security Assistant web UI (optional)
    networks:
      - baumlab

volumes:
  openvas-data:    # Persistent NVT/SCAP/CERT feed data and scan results
  gvmd-socket:     # Ephemeral shared volume for gvmd Unix socket

networks:
  baumlab:
    driver: bridge
